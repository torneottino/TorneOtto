<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorneOtto - The Padel App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ version }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-size: 14px;
        }
        
        .container {
            padding: 10px;
            max-width: 100%;
        }
        
        .main-buttons {
            gap: 15px;
            margin: 30px auto;
        }
        
        .button {
            font-size: 15px;
            padding: 15px;
            width: 280px;
        }
    </style>
</head>
<body>
    <div class="container home-page">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="TorneOtto Logo">
        </div>

        <div class="main-buttons">
            <a href="/inserimento-giocatori" class="button">
                <i class="fas fa-user-plus"></i>
                INSERIMENTO GIOCATORI
            </a>
            <a href="/gestione-tornei" class="button">
                <i class="fas fa-clipboard-list"></i>
                GESTIONE TORNEI SALVATI
            </a>
            <a href="/nuovo-torneo" class="button">
                <i class="fas fa-plus-circle"></i>
                INSERIMENTO NUOVO TORNEO
            </a>
        </div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-icon active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/inserimento-giocatori" class="nav-icon">
            <i class="fas fa-users"></i>
            <span>Giocatori</span>
        </a>
        <a href="/gestione-tornei" class="nav-icon">
            <i class="fas fa-trophy"></i>
            <span>Tornei</span>
        </a>
        <a href="/classifica" class="nav-icon">
            <i class="fas fa-chart-bar"></i>
            <span>Classifica</span>
        </a>
    </nav>
</body>
</html>
