<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Torneo - TorneOtto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ version }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-size: 14px;
        }
        
        .container {
            padding: 10px;
            max-width: 100%;
        }
        
        .form-container {
            padding: 15px;
            margin-top: 10px;
        }
        
        .form-container h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .form-group label {
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .form-group input, 
        .form-group select {
            font-size: 14px;
            padding: 10px;
        }
        
        .button {
            font-size: 15px;
            padding: 12px;
        }
        
        .form-actions {
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="TorneOtto Logo">
        </div>

        <div class="form-container">
            <h2>Modifica Torneo</h2>
            <form action="/modifica-torneo/{{ torneo.id }}" method="POST" class="tournament-form">
                <div class="form-group">
                    <label for="nome">Nome Torneo*</label>
                    <input type="text" id="nome" name="nome" value="{{ torneo.nome }}" required>
                </div>
                
                <div class="form-group">
                    <label for="circolo">Circolo*</label>
                    <input type="text" id="circolo" name="circolo" value="{{ torneo.circolo }}" required>
                </div>
                
                <div class="form-group">
                    <label for="tipo_torneo">Tipo Torneo*</label>
                    <select id="tipo_torneo" name="tipo_torneo" required>
                        <option value="TORNEOTTO_30" {% if torneo.tipo_torneo == 'TORNEOTTO_30' %}selected{% endif %}>TORNEOTTO PARTITE DA 30' (tutti contro tutti)</option>
                        <option value="TORNEOTTO_45" {% if torneo.tipo_torneo == 'TORNEOTTO_45' %}selected{% endif %}>TORNEOTTO PARTITE DA 45' (eliminazione diretta)</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="button">
                        <i class="fas fa-save"></i>
                        SALVA MODIFICHE
                    </button>
                    <a href="/gestione-tornei" class="button secondary">
                        <i class="fas fa-times"></i>
                        ANNULLA
                    </a>
                </div>
            </form>
        </div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-icon">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/inserimento-giocatori" class="nav-icon">
            <i class="fas fa-users"></i>
            <span>Giocatori</span>
        </a>
        <a href="/gestione-tornei" class="nav-icon active">
            <i class="fas fa-trophy"></i>
            <span>Tornei</span>
        </a>
        <a href="/classifica" class="nav-icon">
            <i class="fas fa-chart-bar"></i>
            <span>Classifica</span>
        </a>
    </nav>
</body>
</html>
