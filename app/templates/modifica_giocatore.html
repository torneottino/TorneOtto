<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Giocatore - TorneOtto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ version }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-size: 14px;
        }
        
        .container {
            padding: 10px;
            max-width: 100%;
        }
        
        .form-container {
            padding: 15px;
            margin-top: 10px;
        }
        
        .form-container h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .form-group label {
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .form-group input, 
        .form-group select {
            font-size: 14px;
            padding: 10px;
        }
        
        .button {
            font-size: 15px;
            padding: 12px;
        }
        
        .form-actions {
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="TorneOtto Logo">
        </div>

        <div class="form-container">
            <h2>Modifica Giocatore</h2>
            <form action="/modifica-giocatore/{{ giocatore.id }}" method="POST" class="player-form">
                <div class="form-group">
                    <label for="nome">Nome*</label>
                    <input type="text" id="nome" name="nome" value="{{ giocatore.nome }}" required>
                </div>
                
                <div class="form-group">
                    <label for="punteggio_elo">Punteggio Base ELO</label>
                    <input type="number" id="punteggio_elo" name="punteggio_elo" value="{{ giocatore.punteggio_elo }}" step="0.01">
                </div>
                
                <div class="form-group">
                    <label for="posizione">Posizione*</label>
                    <select id="posizione" name="posizione" required>
                        <option value="DESTRA" {% if giocatore.posizione == 'DESTRA' %}selected{% endif %}>DESTRA</option>
                        <option value="SINISTRA" {% if giocatore.posizione == 'SINISTRA' %}selected{% endif %}>SINISTRA</option>
                        <option value="INDIFFERENTE" {% if giocatore.posizione == 'INDIFFERENTE' %}selected{% endif %}>INDIFFERENTE</option>
                    </select>
                </div>
                
                <div class="form-actions">
                    <a href="/inserimento-giocatori" class="button secondary">
                        <i class="fas fa-arrow-left"></i>
                        ANNULLA
                    </a>
                    <button type="submit" class="button">
                        <i class="fas fa-save"></i>
                        SALVA
                    </button>
                </div>
            </form>
        </div>
    </div>

    <nav class="navbar">
        <a href="/" class="nav-icon">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="/inserimento-giocatori" class="nav-icon active">
            <i class="fas fa-users"></i>
            <span>Giocatori</span>
        </a>
        <a href="/gestione-tornei" class="nav-icon">
            <i class="fas fa-trophy"></i>
            <span>Tornei</span>
        </a>
        <a href="/classifica" class="nav-icon">
            <i class="fas fa-chart-bar"></i>
            <span>Classifica</span>
        </a>
    </nav>
</body>
</html>
