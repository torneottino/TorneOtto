{% extends "base.html" %}

{% block content %}
<div class="main-container">
    <div class="section-header">
        <h2 class="section-title">
            <i class="fas fa-trophy"></i>
            Nuovo Torneo a Gironi
        </h2>
    </div>

    <form method="POST" class="tournament-form">
        <div class="form-group">
            <label for="nome">Nome Torneo<span class="required">*</span></label>
            <input type="text" id="nome" name="nome" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="circolo">Circolo</label>
            <input type="text" id="circolo" name="circolo" class="form-input">
        </div>

        <div class="form-group">
            <label for="note">Note</label>
            <textarea id="note" name="note" class="form-input" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label for="data_inizio">Data Inizio<span class="required">*</span></label>
            <input type="date" id="data_inizio" name="data_inizio" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="data_fine">Data Fine<span class="required">*</span></label>
            <input type="date" id="data_fine" name="data_fine" class="form-input" required>
        </div>

        <input type="hidden" name="tipo_torneo" value="gironi">

        <div class="button-group">
            <button type="submit" class="action-button">
                <i class="fas fa-check"></i> CONFERMA
            </button>
            <a href="{{ url_for('tournaments.tournaments_list') }}" class="action-button secondary">
                <i class="fas fa-times"></i> ANNULLA
            </a>
        </div>
    </form>
</div>

<style>
    .tournament-form {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-input {
        width: 100%;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background-color: #313236;
        color: #ffffff;
        font-size: 16px;
    }

    .form-input:focus {
        border-color: var(--primary-yellow);
        outline: none;
    }

    .required {
        color: #ff2d55;
        margin-left: 4px;
    }

    .button-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    .button-group .action-button {
        flex: 1;
    }

    .action-button.secondary {
        background-color: #444444;
    }

    @media (max-width: 480px) {
        .button-group {
            flex-direction: column;
        }
    }
</style>
{% endblock %}
